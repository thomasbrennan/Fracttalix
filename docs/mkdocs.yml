site_name: Fracttalix
site_description: >
  Real-time streaming anomaly detection — DetectorSuite, FRMSuite, and
  SentinelDetector. Hopf bifurcation detection, critical slowing down,
  time-to-bifurcation estimation, and multi-channel anomaly monitoring.
site_url: https://thomasbrennan.github.io/Fracttalix
repo_url: https://github.com/thomasbrennan/Fracttalix
repo_name: thomasbrennan/Fracttalix
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
nav:
  - Home: index.md
  - Which API?:
    - Choosing an API: getting_started.md
  - DetectorSuite:
    - How-To Guide: detector_suite.md
    - API Reference: api/suite.md
  - FRMSuite:
    - How-To Guide: frm_suite.md
    - API Reference: api/frm.md
    - Design Document: DESIGN-FRMSuite-CBT.md
  - SentinelDetector:
    - Getting Started: getting_started.md
    - API Reference:
      - SentinelDetector: api/detector.md
      - SentinelConfig: api/config.md
      - SentinelResult: api/result.md
      - MultiStreamSentinel: api/multistream.md
      - Benchmark: api/benchmark.md
  - Theory & Internals:
    - Three-Channel Model: three_channel_model.md
    - Step Dependency Graph: dependency_graph.md
    - State Schema: state_schema.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
