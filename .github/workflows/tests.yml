name: Tests

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.deps }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        deps: ["core", "fast"]
        include:
          - python-version: "3.11"
            deps: "full"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core package (no optional deps)
        if: matrix.deps == 'core'
        run: pip install -e ".[dev]"

      - name: Install with numpy + scipy
        if: matrix.deps == 'fast'
        run: pip install -e ".[fast,dev]"

      - name: Install all optional deps
        if: matrix.deps == 'full'
        run: pip install -e ".[full,dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=fracttalix --cov=benchmark --cov-report=term-missing

      - name: Verify zero-dependency import
        if: matrix.deps == 'core'
        run: |
          python -c "
          import sys
          # Ensure numpy is not available in this check
          from fracttalix import SentinelDetector, SentinelConfig
          d = SentinelDetector()
          r = d.update_and_check(1.0)
          assert isinstance(r, dict), 'result must be dict'
          print('Zero-dependency import OK')
          "

      - name: Verify pip install produces correct version
        run: |
          python -c "
          import fracttalix
          assert fracttalix.__version__ == '12.3.0', f'Expected 12.3.0 got {fracttalix.__version__}'
          print('Version check OK:', fracttalix.__version__)
          "

      - name: Run benchmark smoke test
        run: |
          python -c "
          from benchmark import SentinelBenchmark
          b = SentinelBenchmark()
          data, labels = b.generate('point')
          assert len(data) == len(labels)
          print('Benchmark smoke test OK')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check fracttalix/ benchmark/ tests/

  joss-paper-check:
    name: JOSS paper metadata check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check paper.md exists and has required frontmatter
        run: |
          python -c "
          import re, sys
          with open('paper/paper.md') as f:
              content = f.read()
          required = ['title:', 'authors:', 'date:', 'bibliography:']
          missing = [r for r in required if r not in content]
          if missing:
              print('MISSING paper.md fields:', missing)
              sys.exit(1)
          print('paper.md frontmatter OK')
          "
      - name: Check paper.bib exists
        run: test -f paper/paper.bib && echo "paper.bib OK"
