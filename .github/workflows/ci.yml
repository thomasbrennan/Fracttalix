name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite (pure Python, zero dependencies)
        run: python fracttalix_sentinel_v1200.py --test
      - name: Run test suite with NumPy (optional dependency)
        run: |
          pip install numpy
          python fracttalix_sentinel_v1200.py --test

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run benchmark suite
        run: python fracttalix_sentinel_v1200.py --benchmark
