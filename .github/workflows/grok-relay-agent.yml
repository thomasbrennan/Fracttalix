name: Grok Relay Agent

# Triggers when new messages appear in the relay queue,
# or on schedule to catch anything missed.
on:
  push:
    paths:
      - 'relay/queue/MSG-*.json'
    branches:
      - main
  schedule:
    # Check every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grok-process:
    name: Process pending Grok messages
    runs-on: ubuntu-latest
    # Runs whenever the workflow triggers — gated by XAI_API_KEY existing
    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for pending Grok messages
        id: check
        run: |
          count=$(python3 -c "
          import json, glob
          pending = 0
          for f in glob.glob('relay/queue/MSG-*.json'):
              m = json.load(open(f))
              if m.get('to') in ('grok', 'all') and m.get('status') == 'pending':
                  pending += 1
          print(pending)
          ")
          echo "pending=$count" >> $GITHUB_OUTPUT
          echo "Found $count pending message(s) for Grok"

      - name: Run Grok Relay Agent
        if: steps.check.outputs.pending != '0' && env.XAI_API_KEY != ''
        run: |
          cd $GITHUB_WORKSPACE
          python -m relay.grok_agent --no-push

      - name: Commit and push responses
        if: steps.check.outputs.pending != '0'
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "grok-relay-agent"
          git config user.email "relay@fracttalix.dev"
          git add relay/queue/MSG-*.json
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new responses to commit."
          else
            git commit -m "relay(grok-agent): autonomous review cycle"
            git push
          fi
