name: Grok Relay Agent

# Triggers when new messages appear in the relay queue,
# or on schedule to catch anything missed.
on:
  push:
    paths:
      - 'relay/queue/MSG-*.json'
    branches:
      - main
      - 'claude/**'
  schedule:
    # Check every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grok-process:
    name: Process pending Grok messages
    runs-on: ubuntu-latest
    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for pending Grok messages
        id: check
        run: |
          count=$(python3 -c "
          import json, glob
          pending = 0
          for f in glob.glob('relay/queue/MSG-*.json'):
              m = json.load(open(f))
              if m.get('to') in ('grok', 'all') and m.get('status') == 'pending':
                  pending += 1
          print(pending)
          ")
          echo "pending=$count" >> $GITHUB_OUTPUT
          echo "Found $count pending message(s) for Grok"
          if [ -n "$XAI_API_KEY" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "WARNING: XAI_API_KEY is NOT set"
          fi

      - name: Run Grok Relay Agent
        if: steps.check.outputs.pending != '0' && steps.check.outputs.has_key == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          # Batch limit: process up to 5 messages per run to control costs
          python -m relay.grok_agent --no-push --batch-size 5

      - name: Process responses and update tracker
        if: steps.check.outputs.pending != '0'
        run: |
          cd $GITHUB_WORKSPACE
          python -m relay.process_responses --report || true

      - name: Commit and push responses
        if: steps.check.outputs.pending != '0'
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "grok-relay-agent"
          git config user.email "relay@fracttalix.dev"
          git add relay/queue/MSG-*.json
          git add relay/review-tracker.json || true
          git add relay/review-report.md || true
          git add relay/budget-tracker.json || true
          if git diff --cached --quiet; then
            echo "No new responses to commit."
          else
            git commit -m "relay(grok-agent): autonomous review cycle"
            git push origin HEAD
          fi
